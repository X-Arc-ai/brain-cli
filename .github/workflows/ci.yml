name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e '.[dev]'

      - name: Run tests
        run: python -m pytest --tb=short -q

      - name: Run tests with coverage (3.13 only)
        if: matrix.python-version == '3.13'
        run: |
          python -m pytest --cov=brain_cli --cov-report=term-missing --cov-fail-under=60

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Check syntax errors and undefined names
        run: |
          pip install ruff
          ruff check src/ tests/ --select=E,F --ignore=E501,F401,E402,E711,E712
