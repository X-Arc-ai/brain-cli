<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 310">
  <defs>
    <style>
      .bg { fill: #0a0a0b; }
      .chrome { fill: #161618; }
      .dot-r { fill: #ff5f56; }
      .dot-y { fill: #ffbd2e; }
      .dot-g { fill: #27c93f; }
      .t-title { fill: #555555; font-family: 'Fira Code', monospace; font-size: 11px; }
      .prompt { fill: #888888; font-family: 'Fira Code', monospace; font-size: 13px; }
      .cmd { fill: #f0f0f0; font-family: 'Fira Code', monospace; font-size: 13px; }
      .header { fill: #f0f0f0; font-family: 'Fira Code', monospace; font-size: 13px; font-weight: bold; }
      .dim { fill: #555555; font-family: 'Fira Code', monospace; font-size: 13px; }
      .cyan { fill: #4dd0e1; font-family: 'Fira Code', monospace; font-size: 13px; }
      .primary { fill: #cccccc; font-family: 'Fira Code', monospace; font-size: 13px; }
      .red { fill: #e57373; font-family: 'Fira Code', monospace; font-size: 13px; font-weight: bold; }
      .yellow { fill: #ffbd2e; font-family: 'Fira Code', monospace; font-size: 13px; font-weight: bold; }
      .blue { fill: #64b5f6; font-family: 'Fira Code', monospace; font-size: 13px; font-weight: bold; }
      .muted-sm { fill: #555555; font-family: 'Fira Code', monospace; font-size: 12px; }
      .border { stroke: #333338; stroke-width: 1; fill: none; }
    </style>
  </defs>

  <rect width="680" height="310" rx="8" class="bg"/>
  <rect width="680" height="32" rx="8" class="chrome"/>
  <rect y="16" width="680" height="16" class="chrome"/>
  <line x1="0" y1="32" x2="680" y2="32" stroke="#222225" stroke-width="1"/>
  <circle cx="20" cy="16" r="5" class="dot-r"/>
  <circle cx="38" cy="16" r="5" class="dot-y"/>
  <circle cx="56" cy="16" r="5" class="dot-g"/>
  <text x="340" y="20" text-anchor="middle" class="t-title">brain signals</text>

  <!-- Command -->
  <text x="20" y="58" class="prompt">$</text>
  <text x="36" y="58" class="cmd">brain signals</text>

  <!-- Table title -->
  <text x="275" y="84" text-anchor="middle" class="header">Active Signals</text>

  <!-- Table header -->
  <line x1="20" y1="94" x2="660" y2="94" stroke="#333338" stroke-width="1"/>
  <text x="24" y="112" class="header">Type</text>
  <text x="190" y="112" class="header">Node</text>
  <text x="410" y="112" class="header">Detail</text>
  <text x="600" y="112" class="header">Level</text>
  <line x1="20" y1="120" x2="660" y2="120" stroke="#333338" stroke-width="1"/>

  <!-- Row 1: stale critical -->
  <text x="24" y="140" class="primary">stale</text>
  <text x="190" y="140" class="cyan">api-migration</text>
  <text x="410" y="140" class="primary">34 days</text>
  <text x="594" y="140" class="red">CRITICAL</text>

  <!-- Row 2: stale warning -->
  <text x="24" y="162" class="primary">stale</text>
  <text x="190" y="162" class="cyan">deploy-plan</text>
  <text x="410" y="162" class="primary">18 days</text>
  <text x="590" y="162" class="yellow">WARNING</text>

  <!-- Row 3: velocity zero -->
  <text x="24" y="184" class="primary">velocity_zero</text>
  <text x="190" y="184" class="cyan">ship-auth</text>
  <text x="410" y="184" class="primary">21 days stuck</text>
  <text x="590" y="184" class="yellow">WARNING</text>

  <!-- Row 4: dependency changed -->
  <text x="24" y="206" class="primary">dep_changed</text>
  <text x="190" y="206" class="cyan">billing-api</text>
  <text x="410" y="206" class="primary">upstream updated</text>
  <text x="606" y="206" class="blue">INFO</text>

  <!-- Row 5: recently completed -->
  <text x="24" y="228" class="primary">completed</text>
  <text x="190" y="228" class="cyan">setup-ci</text>
  <text x="410" y="228" class="primary">2 days ago</text>
  <text x="606" y="228" class="blue">INFO</text>

  <!-- Row 6: recurring overdue -->
  <text x="24" y="250" class="primary">recurring</text>
  <text x="190" y="250" class="cyan">weekly-review</text>
  <text x="410" y="250" class="primary">3 days overdue</text>
  <text x="590" y="250" class="yellow">WARNING</text>

  <line x1="20" y1="262" x2="660" y2="262" stroke="#333338" stroke-width="1"/>

  <!-- Summary -->
  <text x="20" y="286" class="muted-sm">stale_critical: 1, stale_warning: 1, velocity_zero: 1, dependency_alerts: 1, recently_completed: 1, recurring_overdue: 1</text>
</svg>
